name: WDL CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  validate-wdl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install miniwdl
        run: |
          python -m pip install --upgrade pip
          pip install miniwdl

      - name: Validate WDL files
        run: |
          miniwdl check wdl/AFI_Rickettsiales_Main.wdl
          miniwdl check wdl/AFI_Rickettsiales_Batch.wdl
